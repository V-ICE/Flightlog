################################################################################
# UAVLogBook — Docker Compose Stack
#
# Services:
#   db        — MySQL 8.0  (persistent volume, auto-inits schema)
#   app       — PHP 8.2 + Apache (serves API + built web app + video files)
#   builder   — Node 20 (builds React web app once, then exits)
#   nginx     — Nginx reverse proxy (SSL termination, rate limiting, caching)
#
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker compose up -d          # start everything
#   docker compose logs -f app    # watch PHP logs
#
# First run: builder compiles the React app; app waits for db health check.
# Subsequent runs: builder is skipped (already built), starts in <2s.
################################################################################

services:

  # ── MySQL 8.0 ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: uavlogbook_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-uavlogbook}
      MYSQL_USER:          ${MYSQL_USER:-uavlogbook_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      # Persistent database data
      - db_data:/var/lib/mysql
      # Auto-import schema on first run (mysql-init/ is run once by MySQL entrypoint)
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-uavlogbook_user}",
             "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Tune MySQL for flight telemetry workload (large batch inserts)
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=256M
      --innodb_buffer_pool_size=256M
      --innodb_log_file_size=64M
      --bulk_insert_buffer_size=64M
      --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ENGINE_SUBSTITUTION

  # ── Node builder (runs once to build the React web app) ───
  builder:
    image: node:20-alpine
    container_name: uavlogbook_builder
    working_dir: /build
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api/v1}
      NODE_ENV: production
    volumes:
      # Mount web source
      - ./web:/build:ro
      # Write built output to named volume shared with app
      - web_dist:/build/dist
    # Build only if dist/index.html doesn't already exist (cache-friendly)
    command: >
      sh -c "
        if [ ! -f /build/dist/index.html ]; then
          echo '>>> Installing npm dependencies...' &&
          npm ci --prefer-offline &&
          echo '>>> Building React app...' &&
          npm run build &&
          echo '>>> Build complete.'
        else
          echo '>>> dist/ already exists, skipping build.'
        fi
      "
    networks: []   # builder needs no network access

  # ── PHP 8.2 + Apache application server ───────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: uavlogbook_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      builder:
        condition: service_completed_successfully
    environment:
      # Database
      UAVLOG_DB_HOST:    db
      UAVLOG_DB_NAME:    ${MYSQL_DATABASE:-uavlogbook}
      UAVLOG_DB_USER:    ${MYSQL_USER:-uavlogbook_user}
      UAVLOG_DB_PASS:    ${MYSQL_PASSWORD}
      # Auth
      UAVLOG_JWT_SECRET: ${JWT_SECRET}
      # AI (optional)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # CORS — comma-separated origins
      UAVLOG_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      # PHP tuning
      PHP_MEMORY_LIMIT:       ${PHP_MEMORY_LIMIT:-256M}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-8192M}
      PHP_POST_MAX_SIZE:       ${PHP_POST_MAX_SIZE:-8192M}
      PHP_MAX_EXECUTION_TIME:  ${PHP_MAX_EXECUTION_TIME:-600}
    volumes:
      # PHP source code (hot-reload in dev; bind-mount)
      - ./server:/var/www/html/api:ro
      # Built React app from builder
      - web_dist:/var/www/html:ro
      # Persistent user uploads (logs + videos) — writable
      - uploads_logs:/var/www/uploads/logs
      - uploads_videos:/var/www/uploads/videos
      # Apache config (read-only)
      - ./docker/php/apache.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/uavlogbook.ini:ro
    networks:
      - internal
      - external
    # Expose directly on 8080 for development (Nginx handles 80/443 in production)
    ports:
      - "${APP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx reverse proxy (production SSL + caching) ────────
  nginx:
    image: nginx:1.25-alpine
    container_name: uavlogbook_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates — mount your own or use Certbot
      - ssl_certs:/etc/nginx/ssl
      # For Let's Encrypt webroot challenge
      - letsencrypt_webroot:/var/www/certbot
    networks:
      - external
    profiles:
      # Only start nginx with: docker compose --profile production up
      # For local dev, use app directly on port 8080
      - production

# ── Named volumes ──────────────────────────────────────────
volumes:
  db_data:
    name: uavlogbook_db_data
  web_dist:
    name: uavlogbook_web_dist
  uploads_logs:
    name: uavlogbook_uploads_logs
  uploads_videos:
    name: uavlogbook_uploads_videos
  ssl_certs:
    name: uavlogbook_ssl_certs
  letsencrypt_webroot:
    name: uavlogbook_letsencrypt

# ── Networks ───────────────────────────────────────────────
networks:
  internal:
    name: uavlogbook_internal
    internal: true        # db not reachable from outside
  external:
    name: uavlogbook_external

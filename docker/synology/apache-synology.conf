# ============================================================
# UAVLogBook — Apache VirtualHost for Synology DS412+
# ============================================================

<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On

    # API routing
    RewriteRule ^/api/v1/(.*)$ /var/www/html/api/index.php [QSA,L]

    # SPA fallback — don't rewrite API or uploads
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/uploads/
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} !-f
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]

    # Security headers
    Header always set X-Frame-Options              "DENY"
    Header always set X-Content-Type-Options       "nosniff"
    Header always set X-XSS-Protection             "1; mode=block"
    Header always set Referrer-Policy              "strict-origin-when-cross-origin"

    # Video streaming — range requests essential for HTML5 seeking
    Header always set Accept-Ranges bytes

    # Upload directories
    Alias /uploads /var/www/uploads

    <Directory /var/www/uploads/videos>
        Options -Indexes
        AllowOverride None
        Require all granted
        Header always set Access-Control-Allow-Origin  "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Range"
        Header always set Access-Control-Expose-Headers "Content-Length, Content-Range"
    </Directory>

    <Directory /var/www/uploads/logs>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        php_flag engine off
    </Directory>

    # Block direct access to PHP config files
    <FilesMatch "\.(env|sql|sh)$">
        Require all denied
    </FilesMatch>

    ErrorLog  /var/log/apache2/uavlogbook_error.log
    CustomLog /var/log/apache2/uavlogbook_access.log combined
</VirtualHost>

# ============================================================
# UAVLogBook — Apache Virtual Host (Docker)
# Replaces .htaccess rules with VirtualHost directives
# for better performance (no per-directory AllowOverride)
# ============================================================

Timeout 3600
LimitRequestBody 0

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    # ── Directory: Web root (React SPA + API) ──────────────
    <Directory /var/www/html>
        Options -Indexes -MultiViews +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ── API routing: /api/v1/* → api/index.php ─────────────
    RewriteEngine On

    # Pass Authorization header to PHP (Apache strips it by default)
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

    # Pass CORS preflight OPTIONS through first
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^ - [L]

    # Route API calls
    RewriteRule ^/api/v1/(.*)$ /api/api/index.php [QSA,L]

    # ── SPA fallback (React Router) ────────────────────────
    # Don't rewrite: actual files, API, uploads
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/uploads/
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} !-f
    RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]

    # ── Security headers ────────────────────────────────────
    Header always set X-Frame-Options              "DENY"
    Header always set X-XSS-Protection             "1; mode=block"
    Header always set X-Content-Type-Options       "nosniff"
    Header always set Referrer-Policy              "strict-origin-when-cross-origin"
    Header always set Permissions-Policy           "geolocation=(self)"

    # ── Video streaming: range-request support ─────────────
    Header always set Accept-Ranges bytes

    # ── Video files: direct access for HTML5 <video> ───────
    <Directory /var/www/uploads/videos>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        # CORS for video cross-origin requests
        Header always set Access-Control-Allow-Origin  "*"
        Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
        Header always set Access-Control-Allow-Headers "Range"
        Header always set Access-Control-Expose-Headers "Content-Length, Content-Range"
    </Directory>

    # ── Log uploads: no PHP execution, no directory listing ─
    <Directory /var/www/uploads/logs>
        Options -Indexes -ExecCGI
        AllowOverride None
        Require all granted
        php_flag engine off
    </Directory>

    # ── Block config files from web access ─────────────────
    <FilesMatch "\.(env|sql|sh|json)$">
        Require all denied
    </FilesMatch>

    # ── Performance: cache static assets ───────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css             "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType image/png            "access plus 1 month"
        ExpiresByType image/jpeg           "access plus 1 month"
        ExpiresByType image/svg+xml        "access plus 1 month"
    </IfModule>

    # ── Compression ─────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/html text/css application/javascript \
            application/json text/plain image/svg+xml
    </IfModule>

    # Alias for uploads directory (served from outside docroot)
    Alias /uploads /var/www/uploads

    ErrorLog  ${APACHE_LOG_DIR}/uavlogbook_error.log
    CustomLog ${APACHE_LOG_DIR}/uavlogbook_access.log combined
</VirtualHost>

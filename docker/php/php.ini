; ============================================================
; UAVLogBook — PHP Runtime Configuration (Docker)
; Applied via docker/php/php.ini
; Environment variables override these at runtime
; ============================================================

[PHP]
; ── Upload limits (large log + video files) ──────────────
upload_max_filesize = 8192M
post_max_size       = 8192M
max_file_uploads    = 20
upload_tmp_dir      = /var/www/uploads/tmp

; ── Execution time (large binary log parsing can take time)
max_execution_time  = 600
max_input_time      = 600

; ── Memory ───────────────────────────────────────────────
memory_limit = 256M

; ── Error handling ────────────────────────────────────────
; In production, errors go to log not browser
display_errors   = Off
log_errors       = On
error_log        = /var/log/apache2/php_errors.log
error_reporting  = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Sessions ─────────────────────────────────────────────
session.cookie_httponly = 1
session.cookie_secure   = 0
session.use_strict_mode = 1

; ── Security ─────────────────────────────────────────────
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off

; ── Date ─────────────────────────────────────────────────
date.timezone = UTC

; ── OPcache (production) ─────────────────────────────────
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 4000
opcache.revalidate_freq        = 0
opcache.validate_timestamps    = 0
opcache.fast_shutdown          = 1

; ============================================================
; UAVLogBook — PHP Runtime Configuration (Docker)
; Applied via docker/php/php.ini
; Environment variables override these at runtime
; ============================================================

[PHP]
; ── Upload limits (large log + video files) ──────────────
upload_max_filesize = ${PHP_UPLOAD_MAX_FILESIZE:-8192M}
post_max_size       = ${PHP_POST_MAX_SIZE:-8192M}
max_file_uploads    = 20

; ── Execution time (large binary log parsing can take time)
max_execution_time  = ${PHP_MAX_EXECUTION_TIME:-600}
max_input_time      = 600

; ── Memory ───────────────────────────────────────────────
memory_limit = ${PHP_MEMORY_LIMIT:-256M}

; ── Error handling ────────────────────────────────────────
; In production, errors go to log not browser
display_errors   = ${PHP_DISPLAY_ERRORS:-Off}
log_errors       = On
error_log        = /var/log/apache2/php_errors.log
error_reporting  = ${PHP_ERROR_REPORTING:-E_ALL & ~E_DEPRECATED & ~E_STRICT}

; ── Sessions ─────────────────────────────────────────────
session.cookie_httponly = 1
session.cookie_secure   = 1
session.use_strict_mode = 1

; ── Security ─────────────────────────────────────────────
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off

; ── Date ─────────────────────────────────────────────────
date.timezone = UTC

; ── OPcache (production) ─────────────────────────────────
opcache.enable                 = 1
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 4000
opcache.revalidate_freq        = 0
opcache.validate_timestamps    = ${OPCACHE_VALIDATE_TIMESTAMPS:-0}
opcache.fast_shutdown          = 1

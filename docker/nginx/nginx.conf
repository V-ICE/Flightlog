# ============================================================
# Flightlog — Nginx Main Config (Docker production)
# ============================================================

user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Upload size (match PHP limits) ────────────────────
    client_max_body_size 8200M;
    client_body_timeout  600s;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_connect_timeout 60s;

    # ── Compression ───────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────
    # Auth endpoints: strict (prevent brute force)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # API general: moderate
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    # Upload endpoints: slow (large files take time)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    include /etc/nginx/conf.d/*.conf;
}

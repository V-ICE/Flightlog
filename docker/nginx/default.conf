# ============================================================
# UAVLogBook — Nginx Server Block (Docker production)
# Handles: HTTP→HTTPS redirect, SSL, reverse proxy to app
# ============================================================

# ── HTTP: redirect everything to HTTPS ────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt webroot challenge (certbot renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server block ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${NGINX_SERVER_NAME:-localhost};

    # ── SSL certificates ────────────────────────────────
    # Mount your cert + key via the ssl_certs volume:
    #   docker run -v /etc/letsencrypt:/etc/nginx/ssl ...
    # Or use Certbot (see docker/nginx/certbot.sh)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern SSL config (Mozilla Intermediate)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # HSTS (6 months; add includeSubDomains when ready)
    add_header Strict-Transport-Security "max-age=15768000" always;

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(self)" always;

    # ── Upload size ───────────────────────────────────────
    client_max_body_size 8200M;

    # ── Auth endpoints: strict rate limit ─────────────────
    location ~ ^/api/v1/auth {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:80;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Upload endpoints: relaxed rate limit ──────────────
    location ~ ^/api/v1/(flights|videos) {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:80;
        proxy_read_timeout 600s;
        include            /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── General API ───────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass  http://app:80;
        include     /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Video files: direct streaming with range support ──
    location /uploads/videos/ {
        proxy_pass         http://app:80;
        proxy_buffering    off;          # essential for video range requests
        proxy_read_timeout 3600s;
        add_header Accept-Ranges bytes;
        # Allow caching of video bytes (but not sensitive data)
        add_header Cache-Control "public, max-age=3600";
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Static assets: long-lived cache ───────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        proxy_pass   http://app:80;
        add_header   Cache-Control "public, max-age=31536000, immutable";
        include      /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Everything else → PHP app ─────────────────────────
    location / {
        proxy_pass  http://app:80;
        include     /etc/nginx/conf.d/proxy_params.conf;
    }
}
